services:

  # ── Container 1: API FastAPI
  # build local para dev; após o pipeline, a imagem vem do Docker Hub
  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: ${DOCKER_HUB_USER}/${IMAGE_NAME}:latest
    container_name: pokemon-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-devops_user}:${MONGO_PASSWORD:-devops_password}@mongodb:27017/
      - MONGO_DB=${MONGO_DB:-pokemon_trades}
    depends_on:
      - mosquitto
      - mongodb 
    restart: unless-stopped

  # ── Container 2: Broker MQTT
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  # ── Container 3: SonarQube (análise de código)
  sonarqube:
    build:
      context: .
      dockerfile: Dockerfile.sonarqube
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SONAR_JDBC_USERNAME=${POSTGRES_USER}
      - SONAR_JDBC_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ── Container 4: PostgreSQL (banco do SonarQube)
  db:
    image: postgres:16-alpine
    container_name: sonarqube-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Container 6: Init do SonarQube (roda uma vez)
  # registra webhook para Jenkins e desativa autenticação forçada
  # (permite sonar-scanner rodar sem token na primeira execução)
  sonarqube-init:
    image: alpine:3.20
    container_name: sonarqube-init
    depends_on:
      sonarqube:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --quiet curl
        curl -sf -u admin:admin -X POST http://sonarqube:9000/api/settings/set -d key=sonar.forceAuthentication -d value=false
        curl -sf -u admin:admin -X POST http://sonarqube:9000/api/webhooks/create -d name=Jenkins -d url=http://jenkins:8080/sonarqube-webhook/ || echo 'init: webhook ja existente'
    restart: "no"

  # ── Container 5: Jenkins CI/CD
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    group_add:
      - "0"
    environment:
      - JAVA_OPTS=-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true -Djenkins.install.runSetupWizard=false
    env_file:
      - .env
    depends_on:
      - sonarqube
      - mosquitto
    restart: unless-stopped

  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongodb
    container_name: mongodb-api
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-devops_user}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-devops_password}
      - MONGO_INITDB_DATABASE=${MONGO_DB:-pokemon_trades}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
  mongodb_data:
